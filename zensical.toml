[project]
site_name = "Typed dYdX"
site_description = "Fully typed, validated async clients for the dYdX v4 indexer and node APIs."
repo_name = "dydx"
repo_url = "https://github.com/tribulnation/dydx"
copyright = """
Copyright &copy; 2026 Tribulnation
"""
nav = [
  { "Intro" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Trading Access" = "api-keys.md" },
  { "API Overview" = "api-overview.md" },
  { "Reference" = ["reference/index.md", "reference/error-handling.md", "reference/env-vars.md", { "API Reference" = ["reference/api/index.md", "reference/api/indexer.md", "reference/api/indexer-data.md", "reference/api/indexer-streams.md", "reference/api/public-node.md", "reference/api/private-node.md"] }] },
  { "Examples" = ["examples/index.md", "examples/public-data.md", "examples/authenticated-requests.md", "examples/streams.md"] },
]

[project.theme]
language = "en"
logo = "media/logo.png"
favicon = "media/logo.png"
features = [
  "content.code.copy",
]

[[project.theme.palette]]
scheme = "slate"
primary = "black"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "black"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.extra]
homepage = "https://tribulnation.com"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.superfences]

[project.plugins.mkdocstrings.handlers.python]
paths = ["pkg/src"]
inventories = ["https://docs.python.org/3/objects.inv"]
